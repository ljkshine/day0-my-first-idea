<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요! - 긍정의 한마디</title>
    <meta name="description" content="지친 일상에 활력을 불어넣는 따뜻한 응원의 메시지입니다.">
    
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <h1>
            <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
            나의 첫 서비스
        </h1>
        <button class="hamburger-btn" aria-label="메뉴 열기">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="site-nav">
            <a href="#">소개</a>
            <a href="#">기능</a>
            <a href="#">문의</a>
        </nav>
    </header>

    <main class="container" id="main-content">
        <section class="feature-section">
            <h2 class="section-title">핵심 기능 소개</h2>
            <div class="glass-card" id="idea-card">
                <div class="content-wrapper">
                    <h1 class="idea-text" id="main-heading">오늘도 힘내세요!</h1>
                    <button id="next-btn" class="primary-btn">다음 문장 보기</button>
                </div>
                <div class="glow-effect"></div>
            </div>
        </section>

        <section class="review-section">
            <h2 class="section-title">사용자 후기</h2>
            <div class="reviews-grid">
                <div class="review-card">
                    <img src="profile1.png" alt="사용자 프로필 1" class="review-profile">
                    <div class="review-content">
                        <h4>김민수</h4>
                        <p>"이 서비스 덕분에 하루의 시작이 정말 즐거워졌어요! 매일매일 새로운 에너지를 얻고 갑니다."</p>
                    </div>
                </div>
                <div class="review-card">
                    <img src="profile2.png" alt="사용자 프로필 2" class="review-profile">
                    <div class="review-content">
                        <h4>이수진</h4>
                        <p>"단순하지만 강력한 힘이 있네요. 디자인도 깔끔하고 쓰기 편해서 계속 방문하게 됩니다."</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 My Service</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
